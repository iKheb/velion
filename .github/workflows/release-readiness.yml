name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Beta gate (security + migrations + quality + smoke)
        env:
          MIGRATION_VALIDATE_EMPTY_DB_URL: ${{ secrets.MIGRATION_VALIDATE_EMPTY_DB_URL }}
          MIGRATION_VALIDATE_EXISTING_DB_URL: ${{ secrets.MIGRATION_VALIDATE_EXISTING_DB_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run beta:gate

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: velion-dist
          path: dist
